spring.application.name=backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hospital?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA Configuration - Use update to avoid conflicts with existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

# JSON Configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.open-in-view=false

# Server Configuration
server.port=8082

# Allow circular references temporarily during startup
spring.main.allow-circular-references=true

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.golu.hello.backend=DEBUG
